name: Cleanup Preview

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: vgog-uk-stage
  PREVIEW_CLOUDFRONT_DISTRIBUTION_ID: E3K29R22INXJ8T
  AWS_ROLE_ARN: arn:aws:iam::039304676246:role/github-actions-unity-asset-store-site-deploy

jobs:
  cleanup-preview:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Remove PR preview from S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws s3 rm "s3://${S3_BUCKET}/previews/pr-${PR_NUMBER}" --recursive

      - name: Invalidate cleaned preview path
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${PREVIEW_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/previews/pr-${PR_NUMBER}/*"

      - name: Update preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- preview-link -->";
            const closedText = `${marker}
            Preview environment was cleaned up because this PR is closed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: closedText
              });
            }
