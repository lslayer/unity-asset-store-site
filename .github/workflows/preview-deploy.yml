name: Deploy Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: vgog-uk-stage
  PREVIEW_CLOUDFRONT_DISTRIBUTION_ID: E3K29R22INXJ8T
  PREVIEW_BASE_URL: https://d3jxsiav5zy3kl.cloudfront.net
  AWS_ROLE_ARN: arn:aws:iam::039304676246:role/github-actions-unity-asset-store-site-deploy

jobs:
  deploy-preview:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Deploy PR preview to S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws s3 sync . "s3://${S3_BUCKET}/previews/pr-${PR_NUMBER}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store"

      - name: Invalidate preview cache
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${PREVIEW_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/previews/pr-${PR_NUMBER}/*"

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ env.PREVIEW_BASE_URL }}/previews/pr-${{ github.event.pull_request.number }}/index.html
        with:
          script: |
            const marker = "<!-- preview-link -->";
            const body = `${marker}
            Preview is ready:
            ${process.env.PREVIEW_URL}

            Note: this environment is protected with Basic Auth credentials.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
